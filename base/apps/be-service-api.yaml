apiVersion: apps/v1
kind: Deployment
metadata:
  name: be-service-api
  namespace: ttcs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: be-service-api
  template:
    metadata:
      labels:
        app: be-service-api
    spec:
      containers:
        - name: be-service-api
          image: be-service-image:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ttcs-shared-config
          env:
            - name: MONGO_DATABASE
              value: ttcs
            - name: ENABLE_APP_SCHEDULER
              value: "false"
            - name: ENABLE_EMBEDDED_CHECKIN_SYNC_WORKER
              value: "false"
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ttcs-app-secrets
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ttcs-app-secrets
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ttcs-app-secrets
                  key: JWT_SECRET
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ttcs-app-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ttcs-app-secrets
                  key: RABBITMQ_PASSWORD
            - name: CLOUDINARY_NAME
              valueFrom:
                secretKeyRef:
                  name: ttcs-app-secrets
                  key: CLOUDINARY_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ttcs-app-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: ttcs-app-secrets
                  key: CLOUDINARY_API_SECRET
            - name: CLOUDINARY_FOLDER
              valueFrom:
                secretKeyRef:
                  name: ttcs-app-secrets
                  key: CLOUDINARY_FOLDER
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: be-service-api
  namespace: ttcs
spec:
  selector:
    app: be-service-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
