apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ttcs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: caddy
          image: caddy:2-alpine
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: caddy-data
              mountPath: /data
            - name: caddy-config-data
              mountPath: /config
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: gateway-config
          configMap:
            name: ttcs-gateway-config
        - name: caddy-data
          persistentVolumeClaim:
            claimName: gateway-caddy-data
        - name: caddy-config-data
          persistentVolumeClaim:
            claimName: gateway-caddy-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ttcs
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gateway-caddy-data
  namespace: ttcs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gateway-caddy-config
  namespace: ttcs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
