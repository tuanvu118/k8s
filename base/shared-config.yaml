apiVersion: v1
kind: ConfigMap
metadata:
  name: ttcs-shared-config
  namespace: ttcs
data:
  BACKEND_CONTAINER_PORT: "8000"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  CORS_ALLOW_ORIGINS: "http://ptit.cloud,https://ptit.cloud,http://www.ptit.cloud,https://www.ptit.cloud"
  MONGO_HOST: mongodb
  MONGO_PORT: "27017"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"
  RABBITMQ_PREFETCH_COUNT: "20"
  RABBITMQ_CHECKIN_EXCHANGE: "attendance.events"
  RABBITMQ_CHECKIN_QUEUE: "attendance.checkin.queue"
  RABBITMQ_CHECKIN_ROUTING_KEY: "attendance.checkin.requested"
  RABBITMQ_CHECKIN_RETRY_EXCHANGE: "attendance.retry"
  RABBITMQ_CHECKIN_RETRY_QUEUE: "attendance.checkin.retry.queue"
  RABBITMQ_CHECKIN_RETRY_ROUTING_KEY: "attendance.checkin.retry"
  RABBITMQ_CHECKIN_DEAD_LETTER_EXCHANGE: "attendance.dead"
  RABBITMQ_CHECKIN_DEAD_LETTER_QUEUE: "attendance.checkin.dlq"
  RABBITMQ_CHECKIN_DEAD_LETTER_ROUTING_KEY: "attendance.checkin.failed"
  RABBITMQ_CHECKIN_MAX_RETRIES: "3"
  RABBITMQ_CHECKIN_RETRY_DELAY_MS: "5000"
  RABBITMQ_REGISTRATION_SYNC_EXCHANGE: "registration.sync.events"
  RABBITMQ_REGISTRATION_SYNC_QUEUE: "registration.sync.queue"
  RABBITMQ_REGISTRATION_SYNC_ROUTING_KEY: "registration.sync.requested"
  RABBITMQ_CHECKIN_SYNC_EXCHANGE: "attendance.sync.events"
  RABBITMQ_CHECKIN_SYNC_QUEUE: "attendance.sync.queue"
  RABBITMQ_CHECKIN_SYNC_ROUTING_KEY: "attendance.checkin.completed"
  QR_SESSION_TTL_BUFFER_SECONDS: "300"
  QR_DUPLICATE_PENDING_TTL_SECONDS: "120"
  QR_DUPLICATE_COMPLETED_TTL_SECONDS: "86400"
  QR_CHECKIN_LOCK_TTL_SECONDS: "30"
  QR_DEFAULT_WINDOW_SECONDS: "30"
  QR_MAX_WINDOWS_PER_SESSION: "720"
  HTSK_REGISTER_LOCK_TTL_SECONDS: "10"
  ATTENDANCE_MANUAL_CODE_LENGTH: "8"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ttcs-gateway-config
  namespace: ttcs
data:
  Caddyfile: |
    (common_site) {
      encode zstd gzip
      header {
        -Server
        -X-User-Id
        -X-User-Email
        -X-User-Roles
        -X-Unit-Id
        X-Content-Type-Options "nosniff"
        X-Frame-Options "SAMEORIGIN"
        Referrer-Policy "strict-origin-when-cross-origin"
      }
      log {
        output stdout
        format console
      }
    }

    (auth_gateway) {
      forward_auth auth-gateway:8080 {
        uri /verify
        copy_headers X-User-Id X-User-Email X-User-Roles X-Unit-Id
      }
    }

    (app_proxy_common) {
      header_up Host {host}
      header_up X-Forwarded-Host {host}
      header_up X-Forwarded-Proto {scheme}
      header_up X-Forwarded-For {remote_host}
      transport http {
        dial_timeout 5s
        response_header_timeout 30s
        read_timeout 30s
        write_timeout 30s
      }
    }

    ptit.cloud, www.ptit.cloud {
      import common_site

      handle /api/auth/* {
        reverse_proxy be-service-api:8000 {
          import app_proxy_common
        }
      }

      handle /api/* {
        import auth_gateway
        reverse_proxy be-service-api:8000 {
          import app_proxy_common
        }
      }

      handle /qr/* {
        import auth_gateway
        reverse_proxy qr-service-api:8000 {
          import app_proxy_common
        }
      }

      handle {
        reverse_proxy frontend:80
      }
    }
